<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up | Address Coverage Checker</title>
  <style>
    :root { --bg:#f4f7fb; --card:#fff; --text:#122033; --muted:#64748b; --line:#dbe3ef; --primary:#1d4ed8; --primary2:#2563eb; --error:#991b1b; --errorbg:#fee2e2; --ok:#166534; --okbg:#dcfce7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter, Arial, sans-serif; color:var(--text); background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%); min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card { width:min(100%,560px); background:var(--card); border:1px solid var(--line); border-radius:28px; box-shadow:0 24px 60px rgba(15,23,42,.08); padding:32px; }
    .eyebrow { display:inline-block; padding:8px 12px; border-radius:999px; background:#eff6ff; color:var(--primary); font-weight:800; font-size:12px; letter-spacing:.05em; text-transform:uppercase; }
    h1 { margin:16px 0 10px; font-size:34px; }
    p { color:var(--muted); line-height:1.6; }
    label { display:block; margin:18px 0 8px; font-weight:800; }
    input { width:100%; padding:16px 18px; border:1px solid var(--line); border-radius:16px; font-size:17px; }
    input:focus { outline:none; border-color:#93c5fd; box-shadow:0 0 0 4px rgba(37,99,235,.08); }
    button { width:100%; margin-top:18px; border:none; border-radius:16px; padding:15px 18px; font-size:17px; font-weight:800; color:#fff; background:linear-gradient(135deg,var(--primary),var(--primary2)); cursor:pointer; }
    .status { display:none; margin-top:16px; padding:14px 16px; border-radius:16px; font-weight:700; white-space:pre-wrap; }
    .status.error { display:block; background:var(--errorbg); color:var(--error); }
    .status.success { display:block; background:var(--okbg); color:var(--ok); }
    .footer { margin-top:18px; color:var(--muted); }
    a { color:var(--primary); text-decoration:none; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Account setup</span>
    <h1>Create your account</h1>
    <p>Sign up with your email. The app will ask you to verify your email before you can log in.</p>

    <label for="fullName">Full name</label>
    <input id="fullName" type="text" placeholder="Shah Ahmed" />

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@company.com" />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="At least 8 characters" />

    <button onclick="signup()">Create account</button>
    <div id="status" class="status"></div>

    <div class="footer">Already have an account? <a href="/login">Log in</a></div>
  </div>

  <script>
    function showStatus(kind, text) {
      const status = document.getElementById('status');
      status.className = `status ${kind}`;
      status.innerText = text;
    }

    async function signup() {
      const full_name = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const res = await fetch('/api/signup', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ full_name, email, password })
      });
      const data = await res.json();
      if (!res.ok) {
        showStatus('error', data.detail || 'Signup failed.');
        return;
      }
      let msg = data.message || 'Account created.';
      if (data.preview_url) {
        msg += `\n\nDevelopment shortcut:\n${data.preview_url}`;
      }
      showStatus('success', msg + '\n\nAfter verification, go to the login page.');
    }
  </script>
</body>
</html>
