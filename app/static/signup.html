<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Address Coverage Checker</title>
  <style>
    :root { --bg:#f4f7fb; --card:#fff; --text:#122033; --muted:#64748b; --line:#dbe3ef; --primary:#1d4ed8; --primary2:#2563eb; --error:#991b1b; --errorbg:#fee2e2; --ok:#166534; --okbg:#dcfce7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter, Arial, sans-serif; color:var(--text); background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%); min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card { width:min(100%,540px); background:var(--card); border:1px solid var(--line); border-radius:28px; box-shadow:0 24px 60px rgba(15,23,42,.08); padding:32px; }
    .eyebrow { display:inline-block; padding:8px 12px; border-radius:999px; background:#eff6ff; color:var(--primary); font-weight:800; font-size:12px; letter-spacing:.05em; text-transform:uppercase; }
    h1 { margin:16px 0 10px; font-size:34px; }
    p { color:var(--muted); line-height:1.6; }
    label { display:block; margin:18px 0 8px; font-weight:800; }
    input { width:100%; padding:16px 18px; border:1px solid var(--line); border-radius:16px; font-size:17px; }
    input:focus { outline:none; border-color:#93c5fd; box-shadow:0 0 0 4px rgba(37,99,235,.08); }
    button { width:100%; margin-top:18px; border:none; border-radius:16px; padding:15px 18px; font-size:17px; font-weight:800; color:#fff; background:linear-gradient(135deg,var(--primary),var(--primary2)); cursor:pointer; }
    button:disabled { opacity:0.6; cursor:not-allowed; }
    .status { display:none; margin-top:16px; padding:14px 16px; border-radius:16px; font-weight:700; }
    .status.error { display:block; background:var(--errorbg); color:var(--error); }
    .footer { margin-top:18px; color:var(--muted); font-size:14px; }
    a { color:var(--primary); text-decoration:none; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Get started</span>
    <h1>Create account</h1>
    <p>Sign up to access the address checker and manage your polygon coverage areas.</p>

    <label for="full_name">Full name</label>
    <input id="full_name" type="text" placeholder="Jane Smith" required />

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@company.com" required />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Create a password" required />

    <button id="submitBtn" onclick="signup()">Create account</button>
    <div id="status" class="status"></div>

    <div class="footer">
      Already have an account? <a href="/login">Log in</a>
    </div>
  </div>

  <script>
    async function signup() {
      const name = document.getElementById('full_name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const statusEl = document.getElementById('status');

      statusEl.className = 'status';
      statusEl.style.display = 'none';

      if (!name || !email || !password) {
        statusEl.textContent = 'Please fill in all fields.';
        statusEl.className = 'status error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const resp = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name: name, email: email, password: password })
        });

        if (resp.ok) {
          // Account created - go straight to login
          window.location.href = '/login';
        } else {
          const data = await resp.json();
          statusEl.textContent = data.detail || 'Signup failed. Please try again.';
          statusEl.className = 'status error';
          btn.disabled = false;
          btn.textContent = 'Create account';
        }
      } catch (e) {
        statusEl.textContent = 'Network error. Please try again.';
        statusEl.className = 'status error';
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    }
  </script>
</body>
</html>
