<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Address Coverage Checker</title>
  <style>
    :root { --bg:#f4f7fb; --card:#fff; --text:#122033; --muted:#64748b; --line:#dbe3ef; --primary:#1d4ed8; --primary2:#2563eb; --error:#991b1b; --errorbg:#fee2e2; --ok:#166534; --okbg:#dcfce7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter, Arial, sans-serif; color:var(--text); background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%); min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card { width:min(100%,540px); background:var(--card); border:1px solid var(--line); border-radius:28px; box-shadow:0 24px 60px rgba(15,23,42,.08); padding:32px; }
    .eyebrow { display:inline-block; padding:8px 12px; border-radius:999px; background:#eff6ff; color:var(--primary); font-weight:800; font-size:12px; letter-spacing:.05em; text-transform:uppercase; }
    h1 { margin:16px 0 10px; font-size:34px; }
    p { color:var(--muted); line-height:1.6; }
    label { display:block; margin:18px 0 8px; font-weight:800; }
    input { width:100%; padding:16px 18px; border:1px solid var(--line); border-radius:16px; font-size:17px; }
    input:focus { outline:none; border-color:#93c5fd; box-shadow:0 0 0 4px rgba(37,99,235,.08); }
    button { width:100%; margin-top:18px; border:none; border-radius:16px; padding:15px 18px; font-size:17px; font-weight:800; color:#fff; background:linear-gradient(135deg,var(--primary),var(--primary2)); cursor:pointer; }
    .secondary { background:#eef2ff; color:#1e3a8a; }
    .status { display:none; margin-top:16px; padding:14px 16px; border-radius:16px; font-weight:700; white-space:pre-wrap; }
    .status.error { display:block; background:var(--errorbg); color:var(--error); }
    .status.success { display:block; background:var(--okbg); color:var(--ok); }
    .row { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:10px; }
    .footer { margin-top:18px; color:var(--muted); }
    a { color:var(--primary); text-decoration:none; font-weight:700; }
    .small { font-size:14px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Secure access</span>
    <h1>Log in</h1>
    <p>Sign in to access the address checker, saved polygons, and your lookup history.</p>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@company.com" />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter your password" />

    <button onclick="login()">Log in</button>
    <div id="status" class="status"></div>

    <div class="row small">
      <a href="/forgot-password">Forgot password?</a>
      <a href="#" onclick="resendVerification(event)">Resend verification email</a>
    </div>

    <div class="footer">New here? <a href="/signup">Create an account</a></div>
    <div class="footer" style="margin-top:10px;font-size:12px;">
      <a href="/terms" style="color:inherit;opacity:.6;">Terms of Service</a> &nbsp;·&nbsp;
      <a href="/privacy" style="color:inherit;opacity:.6;">Privacy Policy</a>
    </div>
  </div>

  <script>
    function showStatus(kind, text) {
      const status = document.getElementById('status');
      status.className = `status ${kind}`;
      status.innerText = text;
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const res = await fetch('/api/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) {
        showStatus('error', data.detail || 'Login failed.');
        return;
      }
      window.location.href = '/dashboard';
    }

    async function resendVerification(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showStatus('error', 'Enter your email first, then click resend verification email.');
        return;
      }
      const res = await fetch('/api/resend-verification', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      let msg = data.message || 'Verification email sent.';
      if (data.preview_url) {
        msg += `\n\nDevelopment shortcut:\n${data.preview_url}`;
      }
      showStatus('success', msg);
    }
  </script>
</body>
</html>
