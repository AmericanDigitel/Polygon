<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Address Coverage Checker</title>
  <style>
    :root { --bg:#f4f7fb; --card:#fff; --text:#122033; --muted:#64748b; --line:#dbe3ef; --primary:#1d4ed8; --primary2:#2563eb; --ok:#166534; --okbg:#dcfce7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter, Arial, sans-serif; color:var(--text); background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%); min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card { width:min(100%,540px); background:#fff; border:1px solid var(--line); border-radius:28px; box-shadow:0 24px 60px rgba(15,23,42,.08); padding:32px; }
    .eyebrow { display:inline-block; padding:8px 12px; border-radius:999px; background:#eff6ff; color:var(--primary); font-weight:800; font-size:12px; letter-spacing:.05em; text-transform:uppercase; }
    h1 { margin:16px 0 10px; font-size:34px; }
    p { color:var(--muted); line-height:1.6; }
    label { display:block; margin:18px 0 8px; font-weight:800; }
    input { width:100%; padding:16px 18px; border:1px solid var(--line); border-radius:16px; font-size:17px; }
    button { width:100%; margin-top:18px; border:none; border-radius:16px; padding:15px 18px; font-size:17px; font-weight:800; color:#fff; background:linear-gradient(135deg,var(--primary),var(--primary2)); cursor:pointer; }
    .status { display:none; margin-top:16px; padding:14px 16px; border-radius:16px; font-weight:700; white-space:pre-wrap; }
    .status.success { display:block; background:var(--okbg); color:var(--ok); }
    a { color:var(--primary); text-decoration:none; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Password help</span>
    <h1>Forgot password</h1>
    <p>Enter your email. If an account exists, the app will send a reset link.</p>
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@company.com" />
    <button onclick="submitReset()">Send reset link</button>
    <div id="status" class="status"></div>
    <p><a href="/login">Back to login</a></p>
  </div>
  <script>
    async function submitReset() {
      const email = document.getElementById('email').value.trim();
      const res = await fetch('/api/forgot-password', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      const status = document.getElementById('status');
      let msg = data.message || 'If that email exists, a reset link has been sent.';
      if (data.preview_url) {
        msg += `\n\nDevelopment shortcut:\n${data.preview_url}`;
      }
      status.className = 'status success';
      status.innerText = msg;
    }
  </script>
</body>
</html>
