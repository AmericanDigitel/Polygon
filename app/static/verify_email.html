<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email | Address Coverage Checker</title>
  <style>
    :root { --bg:#f4f7fb; --card:#fff; --text:#122033; --muted:#64748b; --line:#dbe3ef; --primary:#1d4ed8; --error:#991b1b; --errorbg:#fee2e2; --ok:#166534; --okbg:#dcfce7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter, Arial, sans-serif; color:var(--text); background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%); min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card { width:min(100%,540px); background:#fff; border:1px solid var(--line); border-radius:28px; box-shadow:0 24px 60px rgba(15,23,42,.08); padding:32px; }
    .eyebrow { display:inline-block; padding:8px 12px; border-radius:999px; background:#eff6ff; color:var(--primary); font-weight:800; font-size:12px; letter-spacing:.05em; text-transform:uppercase; }
    h1 { margin:16px 0 10px; font-size:34px; }
    p { color:var(--muted); line-height:1.6; }
    .status { display:block; margin-top:16px; padding:14px 16px; border-radius:16px; font-weight:700; white-space:pre-wrap; }
    .status.error { background:var(--errorbg); color:var(--error); }
    .status.success { background:var(--okbg); color:var(--ok); }
    a { color:var(--primary); text-decoration:none; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Email verification</span>
    <h1>Verify your email</h1>
    <p>We are validating your verification link now.</p>
    <div id="status" class="status">Checking your token...</div>
    <p><a href="/login">Go to login</a></p>
  </div>
  <script>
    const token = new URLSearchParams(window.location.search).get('token') || '';
    async function verify() {
      const status = document.getElementById('status');
      if (!token) {
        status.className = 'status error';
        status.innerText = 'Missing verification token.';
        return;
      }
      const res = await fetch('/api/verify-email', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ token })
      });
      const data = await res.json();
      if (!res.ok) {
        status.className = 'status error';
        status.innerText = data.detail || 'Verification failed.';
        return;
      }
      status.className = 'status success';
      status.innerText = (data.message || 'Email verified successfully.') + '\n\nYou can now log in.';
    }
    verify();
  </script>
</body>
</html>
