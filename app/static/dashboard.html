<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Projects — RightG</title>
  <style>
    :root {
      --bg: #f4f7fb; --card: #ffffff; --text: #122033; --muted: #64748b; --line: #dbe3ef;
      --primary: #1d4ed8; --primary2: #2563eb; --danger: #ef4444;
      --success-bg: #dcfce7; --success-tx: #166534;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, Arial, sans-serif; background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%); color: var(--text); min-height: 100vh; }

    /* TOP BAR */
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 32px; background: #fff; border-bottom: 1px solid var(--line);
      flex-wrap: wrap; gap: 12px;
    }
    .logo { font-size: 22px; font-weight: 900; color: var(--primary); text-decoration: none; }
    .top-right { display: flex; align-items: center; gap: 12px; }
    .chip { background: #f1f5f9; color: var(--text); padding: 9px 16px; border-radius: 10px; font-weight: 700; font-size: 14px; }
    .btn { border: none; border-radius: 10px; padding: 10px 18px; font-weight: 700; cursor: pointer; font-size: 14px; }
    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-ghost:hover { background: #f1f5f9; }

    /* MAIN */
    .shell { max-width: 1000px; margin: 0 auto; padding: 40px 20px 60px; }
    .page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
    .page-header h1 { font-size: 32px; font-weight: 900; }
    .page-header p { color: var(--muted); margin-top: 4px; }

    /* NEW PROJECT FORM */
    .new-project-form {
      background: var(--card); border: 1px solid var(--line); border-radius: 20px;
      padding: 24px; margin-bottom: 32px;
      display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
    }
    .field { flex: 1; min-width: 200px; }
    .field label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 6px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .field input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--line); font-size: 15px; outline: none; font-family: inherit; }
    .field input:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(37,99,235,.08); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary2)); color: #fff; padding: 12px 22px; border-radius: 12px; font-size: 15px; white-space: nowrap; }
    .btn-primary:hover { opacity: .92; }

    /* PROJECT CARDS */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
    .project-card {
      background: var(--card); border: 1px solid var(--line); border-radius: 20px;
      padding: 24px; display: flex; flex-direction: column; gap: 16px;
      transition: box-shadow .15s; cursor: pointer;
      text-decoration: none; color: inherit;
    }
    .project-card:hover { box-shadow: 0 8px 28px rgba(15,23,42,.1); border-color: #bfdbfe; }
    .project-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .project-name { font-size: 20px; font-weight: 900; }
    .project-desc { color: var(--muted); font-size: 14px; margin-top: 4px; line-height: 1.5; }
    .project-meta { display: flex; gap: 12px; }
    .meta-pill {
      background: #eff6ff; color: var(--primary); font-weight: 700; font-size: 13px;
      padding: 5px 12px; border-radius: 999px;
    }
    .meta-pill.grey { background: #f1f5f9; color: var(--muted); }
    .project-actions { display: flex; gap: 8px; margin-top: auto; }
    .btn-open {
      flex: 1; background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: #fff; border: none; border-radius: 12px; padding: 11px 14px;
      font-weight: 800; font-size: 14px; cursor: pointer; text-align: center;
      text-decoration: none; display: block;
    }
    .btn-open:hover { opacity: .92; }
    .btn-manage {
      background: #eef2f7; color: var(--text); border: none; border-radius: 12px;
      padding: 11px 14px; font-weight: 700; font-size: 14px; cursor: pointer;
      text-decoration: none; display: block;
    }
    .btn-manage:hover { background: #e2e8f0; }
    .btn-del {
      background: #fee2e2; color: var(--danger); border: none; border-radius: 12px;
      padding: 11px 12px; font-weight: 700; font-size: 14px; cursor: pointer;
    }
    .btn-del:hover { background: #fecaca; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 64px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 16px; max-width: 340px; margin: 0 auto; line-height: 1.6; }

    /* TOAST */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1e293b; color: #fff; padding: 12px 22px; border-radius: 12px;
      font-weight: 700; font-size: 14px; transition: transform .25s; z-index: 100; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .topbar { padding: 14px 20px; }
      .shell { padding: 24px 16px 48px; }
      .new-project-form { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a class="logo" href="/">RightG</a>
    <div class="top-right">
      <div id="userChip" class="chip">Loading…</div>
      <button class="btn btn-ghost" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="shell">
    <div class="page-header">
      <div>
        <h1>My Projects</h1>
        <p>Each project has its own polygons and address check history.</p>
      </div>
    </div>

    <!-- New project form -->
    <form class="new-project-form" onsubmit="createProject(event)">
      <div class="field">
        <label for="projectName">Project name</label>
        <input id="projectName" type="text" placeholder="e.g. Irvine Service Area" required maxlength="200" />
      </div>
      <div class="field">
        <label for="projectDesc">Description (optional)</label>
        <input id="projectDesc" type="text" placeholder="Short note about this project" maxlength="500" />
      </div>
      <button class="btn btn-primary" type="submit">+ Create project</button>
    </form>

    <!-- Project list -->
    <div id="projectsContainer">
      <div class="empty-state">
        <div class="icon">🗂️</div>
        <h2>Loading projects…</h2>
      </div>
    </div>
  </div>

  <div id="toast">Project deleted.</div>

  <script>
    function escapeHtml(v) {
      return String(v)
        .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
        .replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }

    function formatDate(value) {
      const d = new Date(value);
      return isNaN(d.getTime()) ? value : d.toLocaleDateString();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    async function requireAuth() {
      const res = await fetch('/api/me');
      if (res.status === 401) { window.location.href = '/login'; throw new Error(); }
      const user = await res.json();
      document.getElementById('userChip').innerText = `${user.full_name} · ${user.email}`;
      return user;
    }

    async function loadProjects() {
      const res = await fetch('/api/projects');
      if (res.status === 401) { window.location.href = '/login'; return; }
      const projects = await res.json();
      renderProjects(projects);
    }

    function renderProjects(projects) {
      const container = document.getElementById('projectsContainer');
      if (!projects.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🗂️</div>
            <h2>No projects yet</h2>
            <p>Create your first project above, then upload polygons and start checking addresses.</p>
          </div>`;
        return;
      }
      container.innerHTML = `<div class="projects-grid">${projects.map(renderCard).join('')}</div>`;
    }

    function renderCard(p) {
      const polyLabel = p.polygon_count === 1 ? '1 polygon' : `${p.polygon_count} polygons`;
      const desc = p.description ? `<div class="project-desc">${escapeHtml(p.description)}</div>` : '';
      return `
        <div class="project-card">
          <div>
            <div class="project-card-header">
              <div class="project-name">${escapeHtml(p.name)}</div>
            </div>
            ${desc}
          </div>
          <div class="project-meta">
            <span class="meta-pill">${escapeHtml(polyLabel)}</span>
            <span class="meta-pill grey">Since ${formatDate(p.created_at)}</span>
          </div>
          <div class="project-actions">
            <a class="btn-open" href="/checker?project=${p.id}">Open checker</a>
            <a class="btn-manage" href="/manage?project=${p.id}" title="Manage polygons">⚙️</a>
            <button class="btn-del" onclick="deleteProject(event, ${p.id})" title="Delete project">🗑️</button>
          </div>
        </div>`;
    }

    async function createProject(e) {
      e.preventDefault();
      const name = document.getElementById('projectName').value.trim();
      const description = document.getElementById('projectDesc').value.trim() || null;
      if (!name) return;

      const res = await fetch('/api/projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description }),
      });
      if (res.status === 401) { window.location.href = '/login'; return; }
      if (!res.ok) {
        const err = await res.json();
        showToast(err.detail || 'Failed to create project.');
        return;
      }
      document.getElementById('projectName').value = '';
      document.getElementById('projectDesc').value = '';
      showToast('Project created!');
      loadProjects();
    }

    async function deleteProject(e, projectId) {
      e.stopPropagation();
      e.preventDefault();
      if (!confirm('Delete this project and all its polygons?')) return;
      const res = await fetch(`/api/projects/${projectId}`, { method: 'DELETE' });
      if (res.status === 401) { window.location.href = '/login'; return; }
      showToast('Project deleted.');
      loadProjects();
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/';
    }

    async function boot() {
      await requireAuth();
      await loadProjects();
    }
    boot();
  </script>
</body>
</html>
