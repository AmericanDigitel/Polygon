<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — RightG</title>
  <style>
    :root {
      --primary: #2563eb; --primary-dk: #1d4ed8; --primary-lt: #eff6ff;
      --text: #0f172a; --muted: #64748b; --muted2: #94a3b8;
      --bg: #f8fafc; --card: #ffffff; --line: #e2e8f0;
      --red: #ef4444; --red-lt: #fef2f2;
      --green: #16a34a; --green-lt: #f0fdf4;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Inter", Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 50;
      background: #fff; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 60px; gap: 16px;
    }
    .nav-logo { font-size: 20px; font-weight: 800; color: var(--primary); letter-spacing: -.4px; text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-user { font-size: 13px; font-weight: 600; color: var(--muted); background: var(--bg); padding: 6px 12px; border-radius: 8px; }
    .nav-btn { font-size: 13px; font-weight: 600; color: var(--muted); background: none; border: 1px solid var(--line); padding: 6px 14px; border-radius: 8px; cursor: pointer; }
    .nav-btn:hover { background: var(--bg); color: var(--text); }

    /* ── PAGE ── */
    .page { max-width: 960px; margin: 0 auto; padding: 40px 20px 80px; }
    .page-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; gap: 16px; flex-wrap: wrap; }
    .page-head h1 { font-size: 28px; font-weight: 800; }
    .page-head p { font-size: 14px; color: var(--muted); margin-top: 4px; }

    /* ── NEW PROJECT BUTTON / PANEL ── */
    .btn-new { background: var(--primary); color: #fff; font-size: 14px; font-weight: 700; padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .btn-new:hover { background: var(--primary-dk); }

    .new-panel {
      background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
      padding: 24px; margin-bottom: 28px; display: none;
    }
    .new-panel.open { display: block; }
    .new-panel h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .form-field { flex: 1; min-width: 180px; }
    .form-field label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .form-field input { width: 100%; padding: 10px 14px; border: 1px solid var(--line); border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; }
    .form-field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .form-actions { display: flex; gap: 8px; align-items: flex-end; }
    .btn-save { background: var(--primary); color: #fff; font-size: 14px; font-weight: 700; padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; white-space: nowrap; }
    .btn-save:hover { background: var(--primary-dk); }
    .btn-cancel { background: none; color: var(--muted); font-size: 14px; font-weight: 600; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--line); cursor: pointer; }
    .btn-cancel:hover { background: var(--bg); }

    /* ── PROJECT CARDS ── */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

    .project-card {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 20px 20px 16px; display: flex; flex-direction: column; gap: 14px;
      transition: box-shadow .15s, border-color .15s;
    }
    .project-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.08); border-color: #c7d7f0; }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .card-name { font-size: 17px; font-weight: 800; line-height: 1.3; }
    .card-desc { font-size: 13px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
    .card-badge {
      font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px;
      background: var(--primary-lt); color: var(--primary); white-space: nowrap; flex-shrink: 0;
    }

    .card-meta { font-size: 12px; color: var(--muted2); display: flex; gap: 12px; flex-wrap: wrap; }

    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; border-top: 1px solid var(--line); padding-top: 14px; }
    .btn-open {
      flex: 1; background: var(--primary); color: #fff; font-size: 13px; font-weight: 700;
      padding: 9px 14px; border-radius: 9px; border: none; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .btn-open:hover { background: var(--primary-dk); }
    .btn-manage {
      background: var(--bg); color: var(--text); font-size: 13px; font-weight: 600;
      padding: 9px 14px; border-radius: 9px; border: 1px solid var(--line); cursor: pointer;
      text-decoration: none; display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .btn-manage:hover { background: var(--line); }
    .btn-del {
      background: var(--red-lt); color: var(--red); font-size: 13px; font-weight: 600;
      padding: 9px 12px; border-radius: 9px; border: none; cursor: pointer;
    }
    .btn-del:hover { background: #fee2e2; }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 72px 20px; }
    .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .empty p { color: var(--muted); font-size: 14px; max-width: 320px; margin: 0 auto 24px; line-height: 1.6; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
      background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 600; transition: transform .2s; z-index: 999; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .nav { padding: 0 16px; }
      .page { padding: 24px 16px 60px; }
      .form-row { flex-direction: column; }
      .projects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a class="nav-logo" href="/">RightG</a>
    <div class="nav-right">
      <span id="userChip" class="nav-user">Loading…</span>
      <button class="nav-btn" onclick="logout()">Log out</button>
    </div>
  </nav>

  <div class="page">
    <!-- Header -->
    <div class="page-head">
      <div>
        <h1>My Projects</h1>
        <p>Each project has its own polygons and address check history.</p>
      </div>
      <button class="btn-new" onclick="toggleNewPanel()">
        <span>＋</span> New Project
      </button>
    </div>

    <!-- Create project panel -->
    <div id="newPanel" class="new-panel">
      <h3>Create a new project</h3>
      <form class="form-row" onsubmit="createProject(event)">
        <div class="form-field">
          <label>Project name *</label>
          <input id="pName" type="text" placeholder="e.g. Irvine Service Area" required maxlength="200" />
        </div>
        <div class="form-field">
          <label>Description (optional)</label>
          <input id="pDesc" type="text" placeholder="Short note about this project" maxlength="500" />
        </div>
        <div class="form-actions">
          <button class="btn-save" type="submit">Create</button>
          <button class="btn-cancel" type="button" onclick="toggleNewPanel()">Cancel</button>
        </div>
      </form>
    </div>

    <!-- Project list -->
    <div id="container">
      <div class="empty"><div class="empty-icon">⏳</div><h2>Loading…</h2></div>
    </div>
  </div>

  <div id="toast">Done.</div>

  <script>
    let panelOpen = false;

    function toggleNewPanel() {
      panelOpen = !panelOpen;
      document.getElementById('newPanel').classList.toggle('open', panelOpen);
      if (panelOpen) document.getElementById('pName').focus();
    }

    function esc(v) {
      return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
        .replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }
    function fmt(v) {
      const d = new Date(v);
      return isNaN(d) ? v : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    function toast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2600);
    }

    async function requireAuth() {
      const r = await fetch('/api/me');
      if (r.status === 401) { location.href = '/login'; throw 0; }
      const u = await r.json();
      document.getElementById('userChip').innerText = u.full_name;
    }

    async function load() {
      const r = await fetch('/api/projects');
      if (r.status === 401) { location.href = '/login'; return; }
      render(await r.json());
    }

    function render(list) {
      const c = document.getElementById('container');
      if (!list.length) {
        c.innerHTML = `<div class="empty">
          <div class="empty-icon">🗂️</div>
          <h2>No projects yet</h2>
          <p>Click "New Project" above to get started. Each project holds its own set of polygons and address history.</p>
          <button class="btn-new" onclick="toggleNewPanel()" style="margin:0 auto">＋ Create first project</button>
        </div>`; return;
      }
      c.innerHTML = `<div class="projects-grid">${list.map(card).join('')}</div>`;
    }

    function card(p) {
      const polyTxt = p.polygon_count === 1 ? '1 polygon' : `${p.polygon_count} polygons`;
      const desc = p.description ? `<div class="card-desc">${esc(p.description)}</div>` : '';
      return `<div class="project-card">
        <div>
          <div class="card-top">
            <div>
              <div class="card-name">${esc(p.name)}</div>
              ${desc}
            </div>
            <span class="card-badge">${polyTxt}</span>
          </div>
        </div>
        <div class="card-meta">
          <span>📅 Created ${fmt(p.created_at)}</span>
        </div>
        <div class="card-actions">
          <a class="btn-open" href="/checker?project=${p.id}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            Open Checker
          </a>
          <a class="btn-manage" href="/manage?project=${p.id}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            Polygons
          </a>
          <button class="btn-del" onclick="del(event,${p.id})" title="Delete project">🗑</button>
        </div>
      </div>`;
    }

    async function createProject(e) {
      e.preventDefault();
      const name = document.getElementById('pName').value.trim();
      const desc = document.getElementById('pDesc').value.trim() || null;
      const r = await fetch('/api/projects', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name, description: desc })
      });
      if (r.status === 401) { location.href = '/login'; return; }
      if (!r.ok) { toast((await r.json()).detail || 'Error'); return; }
      document.getElementById('pName').value = '';
      document.getElementById('pDesc').value = '';
      panelOpen = false;
      document.getElementById('newPanel').classList.remove('open');
      toast('Project created!'); load();
    }

    async function del(e, id) {
      e.preventDefault(); e.stopPropagation();
      if (!confirm('Delete this project and all its polygons? This cannot be undone.')) return;
      const r = await fetch(`/api/projects/${id}`, { method: 'DELETE' });
      if (r.status === 401) { location.href = '/login'; return; }
      toast('Project deleted.'); load();
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      location.href = '/';
    }

    requireAuth().then(load);
  </script>
</body>
</html>
