<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Polygons — RightG</title>
  <style>
    :root {
      --bg: #f4f7fb; --card: #ffffff; --text: #122033; --muted: #64748b; --line: #dbe3ef;
      --primary: #1d4ed8; --primary2: #2563eb; --danger: #ef4444;
      --success-bg: #dcfce7; --success-tx: #166534;
      --error-bg: #fee2e2; --error-tx: #991b1b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, Arial, sans-serif; background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%); color: var(--text); min-height: 100vh; }

    /* TOP BAR */
    .topbar {
      display: flex; justify-content: space-between; align-items: center; gap: 16px;
      padding: 14px 28px; background: #fff; border-bottom: 1px solid var(--line); flex-wrap: wrap;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .logo { font-size: 20px; font-weight: 900; color: var(--primary); text-decoration: none; }
    .breadcrumb { color: var(--muted); font-size: 14px; }
    .breadcrumb a { color: var(--primary); text-decoration: none; font-weight: 700; }
    .project-title { font-weight: 800; font-size: 15px; }
    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .chip { background: #f1f5f9; color: var(--text); padding: 8px 14px; border-radius: 10px; font-weight: 700; font-size: 13px; }
    .topbtn { text-decoration: none; background: #fff; color: var(--text); border: 1px solid var(--line); padding: 8px 14px; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; }
    .topbtn:hover { background: #f8fafc; }

    /* MAIN */
    .shell { max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }
    .card { background: var(--card); border: 1px solid rgba(219,227,239,.9); border-radius: 22px; box-shadow: 0 16px 40px rgba(15,23,42,.06); padding: 28px; }
    .eyebrow { display: inline-block; padding: 6px 12px; border-radius: 999px; background: #eff6ff; color: var(--primary); font-weight: 800; font-size: 11px; letter-spacing: .05em; text-transform: uppercase; }
    h2 { margin: 12px 0 8px; font-size: 26px; }
    .subtext { color: var(--muted); line-height: 1.6; margin-bottom: 20px; font-size: 15px; }
    label { display: block; font-weight: 800; margin: 16px 0 8px; font-size: 14px; }
    input[type=file] { width: 100%; padding: 14px; border: 1px solid var(--line); border-radius: 14px; background: #fff; font-family: inherit; font-size: 14px; }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    button { border: none; border-radius: 14px; padding: 12px 18px; font-weight: 800; cursor: pointer; font-size: 15px; font-family: inherit; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary2)); color: #fff; }
    .btn-primary:hover { opacity: .92; }
    .btn-secondary { background: #eef2f7; color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: .9; }

    .status-msg {
      margin-top: 18px; padding: 14px 16px; border-radius: 16px;
      font-weight: 700; font-size: 14px; line-height: 1.5;
      background: var(--success-bg); color: var(--success-tx);
    }
    .status-msg.err { background: var(--error-bg); color: var(--error-tx); }

    .list { margin-top: 28px; }
    .list h2 { margin-bottom: 16px; }
    .item {
      display: flex; justify-content: space-between; align-items: center; gap: 16px;
      padding: 16px 20px; border: 1px solid var(--line); border-radius: 18px;
      margin-bottom: 12px; background: #fff;
    }
    .item-name { font-size: 17px; font-weight: 900; }
    .item-meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .btn-del-sm { background: #fee2e2; color: var(--danger); border: none; border-radius: 10px; padding: 9px 14px; font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .btn-del-sm:hover { background: #fecaca; }

    .empty-list { color: var(--muted); padding: 20px 0; font-size: 15px; }

    @media (max-width: 600px) {
      .topbar { padding: 12px 16px; }
      .item { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a class="logo" href="/dashboard">RightG</a>
      <span class="breadcrumb">/ <a href="/dashboard">Projects</a> / <span id="projectTitleBreadcrumb" class="project-title">Loading…</span> / Manage</span>
    </div>
    <div class="top-actions">
      <div id="userChip" class="chip">Loading…</div>
      <a id="checkerLink" class="topbtn" href="#">← Back to checker</a>
      <button class="topbtn" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="shell">
    <div class="card">
      <span class="eyebrow">Polygon management</span>
      <h2 id="projectTitle">Manage Polygons</h2>
      <div class="subtext">Upload GeoJSON or KML files to add coverage zones to this project. You can upload multiple files — new polygons are added to the existing list.</div>

      <label for="fileInput">GeoJSON or KML file</label>
      <input id="fileInput" type="file" accept=".geojson,.json,.kml" />

      <div class="btn-row">
        <button class="btn-primary" onclick="uploadPolygons()">Add polygons</button>
        <button class="btn-secondary" onclick="refreshList()">Refresh list</button>
        <button class="btn-danger" onclick="deleteAll()">Delete all polygons</button>
      </div>

      <div id="statusMsg" class="status-msg" style="display:none"></div>

      <div class="list">
        <h2>Saved polygons</h2>
        <div id="polygonList"><div class="empty-list">Loading…</div></div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get('project');

    if (!projectId) {
      window.location.href = '/dashboard';
    }

    document.getElementById('checkerLink').href = `/checker?project=${projectId}`;

    function escapeHtml(v) {
      return String(v)
        .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
        .replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById('statusMsg');
      el.innerText = msg;
      el.className = 'status-msg' + (isError ? ' err' : '');
      el.style.display = 'block';
    }

    async function requireAuth() {
      const res = await fetch('/api/me');
      if (res.status === 401) { window.location.href = '/login'; throw new Error(); }
      const user = await res.json();
      document.getElementById('userChip').innerText = `${user.full_name} · ${user.email}`;
    }

    async function loadProject() {
      const res = await fetch('/api/projects');
      if (res.status === 401) { window.location.href = '/login'; return; }
      const projects = await res.json();
      const project = projects.find(p => String(p.id) === String(projectId));
      if (!project) {
        alert('Project not found.');
        window.location.href = '/dashboard';
        return;
      }
      document.title = `Manage — ${project.name} — RightG`;
      document.getElementById('projectTitle').innerText = `Manage: ${project.name}`;
      document.getElementById('projectTitleBreadcrumb').innerText = project.name;
    }

    async function refreshList() {
      const res = await fetch(`/api/projects/${projectId}/polygon-list`);
      if (res.status === 401) { window.location.href = '/login'; return; }
      const items = await res.json();
      const container = document.getElementById('polygonList');
      if (!items.length) {
        container.innerHTML = '<div class="empty-list">No polygons saved yet. Upload a GeoJSON or KML file above.</div>';
        return;
      }
      container.innerHTML = items.map(item => `
        <div class="item">
          <div>
            <div class="item-name">${escapeHtml(item.name)}</div>
            <div class="item-meta">${escapeHtml(item.geometry_type)}${item.source_file ? ' · from ' + escapeHtml(item.source_file) : ''}</div>
          </div>
          <button class="btn-del-sm" onclick="deletePolygon('${escapeHtml(item.id)}')">Delete</button>
        </div>
      `).join('');
      setStatus(`${items.length} polygon${items.length === 1 ? '' : 's'} saved.`);
    }

    async function uploadPolygons() {
      const input = document.getElementById('fileInput');
      if (!input.files.length) { alert('Choose a file first.'); return; }
      const form = new FormData();
      form.append('file', input.files[0]);
      const res = await fetch(`/api/projects/${projectId}/polygons/upload`, { method: 'POST', body: form });
      if (res.status === 401) { window.location.href = '/login'; return; }
      const data = await res.json();
      if (!res.ok) {
        setStatus(data.detail || 'Upload failed.', true);
        return;
      }
      setStatus(`${data.message} Total: ${data.total_polygon_count}`);
      input.value = '';
      refreshList();
    }

    async function deletePolygon(id) {
      if (!confirm('Delete this polygon?')) return;
      const res = await fetch(`/api/projects/${projectId}/polygons/${id}`, { method: 'DELETE' });
      if (res.status === 401) { window.location.href = '/login'; return; }
      const data = await res.json();
      setStatus(data.message || 'Polygon deleted.');
      refreshList();
    }

    async function deleteAll() {
      if (!confirm('Delete ALL polygons in this project?')) return;
      const res = await fetch(`/api/projects/${projectId}/polygons`, { method: 'DELETE' });
      if (res.status === 401) { window.location.href = '/login'; return; }
      const data = await res.json();
      setStatus(data.message || 'All polygons deleted.');
      refreshList();
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/';
    }

    async function boot() {
      await requireAuth();
      await loadProject();
      await refreshList();
    }
    boot();
  </script>
</body>
</html>
