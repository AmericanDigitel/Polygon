<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Address Checker — RightG</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #f4f7fb; --card: #ffffff; --text: #122033; --muted: #64748b; --line: #dbe3ef;
      --primary: #1d4ed8; --primary-2: #2563eb; --success-bg: #dcfce7; --success-tx: #166534;
      --error-bg: #fee2e2; --error-tx: #991b1b; --neutral-bg: #eff6ff; --neutral-tx: #1e3a8a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, Arial, sans-serif; background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%); color: var(--text); }

    /* TOP BAR */
    .topbar {
      display: flex; justify-content: space-between; align-items: center; gap: 16px;
      padding: 14px 28px; background: #fff; border-bottom: 1px solid var(--line); flex-wrap: wrap;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .logo { font-size: 20px; font-weight: 900; color: var(--primary); text-decoration: none; }
    .breadcrumb { color: var(--muted); font-size: 14px; }
    .breadcrumb a { color: var(--primary); text-decoration: none; font-weight: 700; }
    .project-title { font-weight: 800; font-size: 15px; }
    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .chip { background: #f1f5f9; color: var(--text); padding: 8px 14px; border-radius: 10px; font-weight: 700; font-size: 13px; }
    .topbtn { text-decoration: none; background: #fff; color: var(--text); border: 1px solid var(--line); padding: 8px 14px; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; }
    .topbtn:hover { background: #f8fafc; }

    /* LAYOUT */
    .shell { max-width: 1320px; margin: 0 auto; padding: 24px 20px 36px; }
    .layout { display: grid; grid-template-columns: 420px 1fr; gap: 20px; }
    .card { background: var(--card); border: 1px solid rgba(219,227,239,.9); border-radius: 22px; box-shadow: 0 16px 40px rgba(15,23,42,.06); padding: 22px; }

    .eyebrow { display: inline-block; padding: 6px 12px; border-radius: 999px; background: #eff6ff; color: var(--primary); font-weight: 800; font-size: 11px; letter-spacing: .05em; text-transform: uppercase; }
    h2 { margin: 12px 0 6px; font-size: 26px; }
    h3 { margin: 0 0 10px; font-size: 18px; }
    .subtext { color: var(--muted); line-height: 1.6; margin-bottom: 16px; font-size: 15px; }
    label { display: block; font-weight: 800; margin: 14px 0 7px; font-size: 14px; }
    input[type="text"] { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--line); font-size: 17px; outline: none; font-family: inherit; }
    input[type="text"]:focus { border-color: #93c5fd; box-shadow: 0 0 0 4px rgba(37,99,235,.08); }

    .btn-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    button { border: none; border-radius: 14px; padding: 12px 16px; font-weight: 800; cursor: pointer; font-size: 16px; font-family: inherit; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: #fff; }
    .btn-secondary { background: #eef2f7; color: var(--text); }

    .status { margin-top: 16px; padding: 14px 16px; border-radius: 16px; font-weight: 800; line-height: 1.5; font-size: 15px; }
    .success { background: var(--success-bg); color: var(--success-tx); }
    .error { background: var(--error-bg); color: var(--error-tx); }
    .neutral { background: var(--neutral-bg); color: var(--neutral-tx); }

    .meta { margin-top: 14px; color: var(--text); line-height: 1.7; font-size: 14px; }
    .pill { display: inline-block; margin: 4px 6px 0 0; padding: 5px 10px; border-radius: 999px; background: #eef2ff; color: #3730a3; font-size: 12px; font-weight: 800; }

    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 16px; }
    .stat { background: #f8fbff; border: 1px solid var(--line); border-radius: 16px; padding: 12px; }
    .stat .num { font-size: 26px; font-weight: 900; }
    .stat .lbl { color: var(--muted); font-size: 12px; margin-top: 2px; }

    .history { margin-top: 16px; border-top: 1px solid var(--line); padding-top: 16px; }
    .history-item { padding: 10px 0; border-bottom: 1px solid #edf2f7; }
    .history-item:last-child { border-bottom: none; }
    .history-top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .history-address { font-weight: 800; font-size: 14px; }
    .history-time { color: var(--muted); font-size: 12px; text-align: right; flex-shrink: 0; }
    .history-match { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .match-yes { color: #166534; }
    .match-no { color: #991b1b; }

    #map { min-height: 700px; width: 100%; border-radius: 20px; }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      #map { min-height: 440px; }
      .topbar { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <a class="logo" href="/dashboard">RightG</a>
      <span class="breadcrumb">/ <a href="/dashboard">Projects</a> / <span id="projectTitleBreadcrumb" class="project-title">Loading…</span></span>
    </div>
    <div class="top-actions">
      <div id="userChip" class="chip">Loading…</div>
      <a id="manageLink" class="topbtn" href="#">⚙️ Manage polygons</a>
      <button class="topbtn" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="shell">
    <div class="layout">
      <div class="card">
        <span class="eyebrow">Coverage lookup</span>
        <h2 id="projectTitle">Address Checker</h2>
        <div class="subtext" id="projectSubtext">Enter an address to check if it falls inside your saved polygons.</div>

        <label for="addressInput">Address</label>
        <input id="addressInput" type="text" placeholder="123 Main St, Irvine, CA" />
        <div class="btn-row">
          <button class="btn-primary" onclick="checkAddress()">Check address</button>
          <button class="btn-secondary" onclick="fitPolygons()">Zoom to coverage</button>
        </div>
        <div id="result" class="status neutral">Enter an address and click Check address.</div>
        <div id="resultMeta" class="meta"></div>

        <div class="stats">
          <div class="stat"><div id="polygonCount" class="num">—</div><div class="lbl">Polygons</div></div>
          <div class="stat"><div id="loadedStatus" class="num">Ready</div><div class="lbl">System status</div></div>
        </div>

        <div class="history">
          <h3>Recent checks</h3>
          <div id="historyList" class="subtext">No checks yet.</div>
        </div>
      </div>

      <div class="card"><div id="map"></div></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Read project ID from URL
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get('project');

    if (!projectId) {
      window.location.href = '/dashboard';
    }

    // Set manage link
    document.getElementById('manageLink').href = `/manage?project=${projectId}`;

    const map = L.map('map').setView([33.6846, -117.8265], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let polygonsLayer = L.geoJSON(null, {
      style: { color: '#2563eb', weight: 2, fillColor: '#60a5fa', fillOpacity: 0.25 },
      onEachFeature: (feature, layer) => {
        const name = feature?.properties?.name || 'Unnamed polygon';
        layer.bindPopup(name);
      }
    }).addTo(map);
    let markerLayer = L.layerGroup().addTo(map);

    async function requireAuth() {
      const res = await fetch('/api/me');
      if (res.status === 401) { window.location.href = '/login'; throw new Error(); }
      const user = await res.json();
      document.getElementById('userChip').innerText = `${user.full_name} · ${user.email}`;
      return user;
    }

    async function loadProject() {
      const res = await fetch('/api/projects');
      if (res.status === 401) { window.location.href = '/login'; return; }
      const projects = await res.json();
      const project = projects.find(p => String(p.id) === String(projectId));
      if (!project) {
        alert('Project not found.');
        window.location.href = '/dashboard';
        return;
      }
      document.title = `${project.name} — RightG`;
      document.getElementById('projectTitle').innerText = project.name;
      document.getElementById('projectTitleBreadcrumb').innerText = project.name;
      if (project.description) {
        document.getElementById('projectSubtext').innerText = project.description;
      }
    }

    async function loadPolygons() {
      const res = await fetch(`/api/projects/${projectId}/polygons`);
      if (res.status === 401) { window.location.href = '/login'; return; }
      if (!res.ok) return;
      const data = await res.json();
      polygonsLayer.clearLayers();
      polygonsLayer.addData(data);
      const count = (data.features || []).length;
      document.getElementById('polygonCount').innerText = count;
      document.getElementById('loadedStatus').innerText = count ? 'Loaded' : 'Empty';
      if (count) fitPolygons();
    }

    async function loadHistory() {
      const res = await fetch(`/api/projects/${projectId}/my-checks`);
      if (res.status === 401) { window.location.href = '/login'; return; }
      if (!res.ok) return;
      const rows = await res.json();
      const el = document.getElementById('historyList');
      if (!rows.length) {
        el.innerHTML = '<div class="subtext">No checks yet.</div>';
        return;
      }
      el.innerHTML = rows.map(row => `
        <div class="history-item">
          <div class="history-top">
            <div>
              <div class="history-address">${escapeHtml(row.input_address)}</div>
              <div class="history-match ${row.matched ? 'match-yes' : 'match-no'}">
                ${row.matched ? '✓ Inside' : '✗ Outside'}
                ${row.matched_polygon_names.length ? ' · ' + row.matched_polygon_names.map(escapeHtml).join(', ') : ''}
              </div>
            </div>
            <div class="history-time">${formatDate(row.created_at)}</div>
          </div>
        </div>
      `).join('');
    }

    async function checkAddress() {
      const address = document.getElementById('addressInput').value.trim();
      if (!address) { alert('Enter an address first.'); return; }

      const resultEl = document.getElementById('result');
      const metaEl = document.getElementById('resultMeta');
      resultEl.className = 'status neutral';
      resultEl.innerText = 'Checking…';
      metaEl.innerHTML = '';

      const res = await fetch(`/api/projects/${projectId}/check-address`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address }),
      });
      if (res.status === 401) { window.location.href = '/login'; return; }
      const data = await res.json();
      markerLayer.clearLayers();

      if (!res.ok) {
        resultEl.className = 'status error';
        resultEl.innerText = data.detail || 'Check failed.';
        return;
      }

      const marker = L.marker([data.geocode.lat, data.geocode.lng]).addTo(markerLayer);
      marker.bindPopup(data.normalized_address || data.address).openPopup();
      map.panTo([data.geocode.lat, data.geocode.lng]);

      if (data.matched) {
        resultEl.className = 'status success';
        resultEl.innerText = '✓ Inside — this address is inside at least one polygon.';
      } else {
        resultEl.className = 'status error';
        resultEl.innerText = '✗ Outside — this address is not inside any polygon.';
      }

      const names = (data.matched_polygon_names || []).map(n => `<span class="pill">${escapeHtml(n)}</span>`).join('');
      metaEl.innerHTML = `
        <div><strong>Normalized:</strong> ${escapeHtml(data.normalized_address || data.address)}</div>
        <div><strong>Coordinates:</strong> ${data.geocode.lat.toFixed(6)}, ${data.geocode.lng.toFixed(6)}</div>
        <div><strong>Polygons checked:</strong> ${data.total_polygons_checked}</div>
        <div><strong>Matched:</strong> ${names || 'None'}</div>
      `;
      loadHistory();
    }

    function fitPolygons() {
      if (polygonsLayer.getLayers().length) {
        map.fitBounds(polygonsLayer.getBounds(), { padding: [20, 20] });
      }
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/';
    }

    function formatDate(value) {
      const d = new Date(value);
      return isNaN(d.getTime()) ? value : d.toLocaleString();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
        .replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }

    async function boot() {
      await requireAuth();
      await loadProject();
      await loadPolygons();
      await loadHistory();
    }
    boot();
  </script>
</body>
</html>
