<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Address Checker — RightG</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --primary: #2563eb; --primary-dk: #1d4ed8; --primary-lt: #eff6ff;
      --text: #0f172a; --muted: #64748b; --muted2: #94a3b8;
      --bg: #f8fafc; --card: #ffffff; --line: #e2e8f0;
      --green: #16a34a; --green-lt: #f0fdf4; --green-ring: #bbf7d0;
      --red: #dc2626; --red-lt: #fef2f2; --red-ring: #fecaca;
      --blue-lt: #eff6ff; --blue-ring: #bfdbfe;
      --nav-h: 60px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Inter", Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

    /* ── TOP NAV ── */
    .nav {
      height: var(--nav-h); flex-shrink: 0;
      background: #fff; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; padding: 0 20px; gap: 0;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px; text-decoration: none;
      color: var(--muted); font-size: 13px; font-weight: 600; padding: 6px 12px;
      border-radius: 8px; border: 1px solid var(--line); margin-right: 14px; white-space: nowrap;
    }
    .nav-back:hover { background: var(--bg); color: var(--text); }
    .nav-back svg { flex-shrink: 0; }
    .nav-divider { width: 1px; height: 22px; background: var(--line); margin: 0 14px; flex-shrink: 0; }
    .nav-project { font-size: 15px; font-weight: 800; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 14px; }
    .nav-pill {
      display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 600;
      padding: 6px 12px; border-radius: 8px; border: 1px solid var(--line);
      text-decoration: none; color: var(--text); background: #fff; cursor: pointer; white-space: nowrap;
    }
    .nav-pill:hover { background: var(--bg); }
    .nav-pill.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .nav-pill.primary:hover { background: var(--primary-dk); }
    .nav-user { font-size: 13px; font-weight: 600; color: var(--muted); padding: 0 4px; }

    /* ── APP BODY — full height below nav ── */
    .app-body { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ── LEFT PANEL ── */
    .panel {
      width: 380px; flex-shrink: 0; background: #fff; border-right: 1px solid var(--line);
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* Panel tabs */
    .tabs { display: flex; border-bottom: 1px solid var(--line); flex-shrink: 0; }
    .tab {
      flex: 1; padding: 12px 16px; font-size: 13px; font-weight: 700; text-align: center;
      cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px;
      user-select: none;
    }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* Tab panes */
    .tab-pane { display: none; flex: 1; overflow-y: auto; padding: 20px; flex-direction: column; gap: 16px; }
    .tab-pane.active { display: flex; }

    /* Address check form */
    .field-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .addr-input {
      width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px;
      font-size: 15px; font-family: inherit; outline: none;
    }
    .addr-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }

    .btn-check {
      width: 100%; background: var(--primary); color: #fff; font-size: 15px; font-weight: 700;
      padding: 12px; border-radius: 10px; border: none; cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 7px;
    }
    .btn-check:hover { background: var(--primary-dk); }
    .btn-check:disabled { opacity: .6; cursor: not-allowed; }

    /* Result box */
    .result-box {
      border-radius: 12px; padding: 14px 16px; font-weight: 700; font-size: 14px; line-height: 1.5;
      background: var(--blue-lt); color: #1e40af; border: 1px solid var(--blue-ring);
    }
    .result-box.inside { background: var(--green-lt); color: var(--green); border-color: var(--green-ring); }
    .result-box.outside { background: var(--red-lt); color: var(--red); border-color: var(--red-ring); }
    .result-box.loading { opacity: .7; }

    .result-detail { font-size: 13px; color: var(--muted); line-height: 1.8; }
    .result-detail strong { color: var(--text); }
    .pill { display: inline-block; background: #e0e7ff; color: #3730a3; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 999px; margin: 2px 3px 0 0; }

    /* Stats row */
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
    .stat-num { font-size: 22px; font-weight: 900; }
    .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

    /* Zoom btn */
    .btn-zoom {
      width: 100%; background: var(--bg); color: var(--text); font-size: 13px; font-weight: 600;
      padding: 10px; border-radius: 10px; border: 1px solid var(--line); cursor: pointer;
    }
    .btn-zoom:hover { background: var(--line); }

    /* History tab */
    .hist-empty { color: var(--muted); font-size: 14px; padding: 8px 0; }
    .hist-item { border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
    .hist-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .hist-addr { font-size: 14px; font-weight: 700; }
    .hist-time { font-size: 11px; color: var(--muted2); flex-shrink: 0; }
    .hist-status { font-size: 12px; font-weight: 700; margin-top: 5px; }
    .hist-inside { color: var(--green); }
    .hist-outside { color: var(--red); }

    /* ── MAP ── */
    .map-wrap { flex: 1; position: relative; min-width: 0; }
    #map { width: 100%; height: 100%; }
    .map-hint {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,.92); backdrop-filter: blur(4px);
      border: 1px solid var(--line); border-radius: 999px;
      font-size: 12px; font-weight: 600; color: var(--muted);
      padding: 6px 14px; pointer-events: none; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,.08); z-index: 10;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .app-body { flex-direction: column; overflow: auto; }
      .panel { width: 100%; border-right: none; border-bottom: 1px solid var(--line); max-height: 420px; }
      .map-wrap { min-height: 400px; }
    }
    @media (max-width: 600px) {
      .nav { padding: 0 12px; }
      .nav-user { display: none; }
      .nav-divider { display: none; }
    }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="nav">
    <a class="nav-back" href="/dashboard">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      All Projects
    </a>
    <div class="nav-divider"></div>
    <span id="navProjectName" class="nav-project">Loading…</span>
    <div class="nav-right">
      <a id="manageBtn" class="nav-pill" href="#">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Manage Polygons
      </a>
      <span id="navUser" class="nav-user"></span>
      <button class="nav-pill" onclick="logout()">Log out</button>
    </div>
  </nav>

  <!-- APP BODY -->
  <div class="app-body">

    <!-- LEFT PANEL -->
    <div class="panel">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('check')">Check Address</div>
        <div class="tab" onclick="switchTab('history')">History</div>
      </div>

      <!-- CHECK TAB -->
      <div id="tab-check" class="tab-pane active">
        <div>
          <div class="field-label">Enter an address</div>
          <input id="addrInput" class="addr-input" type="text" placeholder="123 Main St, Irvine, CA"
            onkeydown="if(event.key==='Enter') checkAddr()" />
        </div>
        <button class="btn-check" id="checkBtn" onclick="checkAddr()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Check Address
        </button>

        <div id="resultBox" class="result-box">
          Type an address above and press Check.
        </div>
        <div id="resultDetail" class="result-detail" style="display:none"></div>

        <div class="stats">
          <div class="stat"><div id="statPoly" class="stat-num">—</div><div class="stat-lbl">Polygons</div></div>
          <div class="stat"><div id="statStatus" class="stat-num">Ready</div><div class="stat-lbl">Status</div></div>
        </div>

        <button class="btn-zoom" onclick="fitPolygons()">
          🗺 Zoom to coverage area
        </button>
      </div>

      <!-- HISTORY TAB -->
      <div id="tab-history" class="tab-pane">
        <div class="field-label">Recent checks</div>
        <div id="histList"><div class="hist-empty">No checks yet.</div></div>
      </div>
    </div>

    <!-- MAP -->
    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-hint" id="mapHint">Coverage zones shown in blue</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    /* ── Init ── */
    const params = new URLSearchParams(location.search);
    const projectId = params.get('project');
    if (!projectId) location.href = '/dashboard';

    document.getElementById('manageBtn').href = `/manage?project=${projectId}`;

    /* ── Map ── */
    const map = L.map('map').setView([33.6846, -117.8265], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19, attribution: '© OpenStreetMap'
    }).addTo(map);

    const polyLayer = L.geoJSON(null, {
      style: { color: '#2563eb', weight: 2, fillColor: '#93c5fd', fillOpacity: 0.22 },
      onEachFeature: (f, layer) => layer.bindPopup(f?.properties?.name || 'Unnamed')
    }).addTo(map);
    const markerLayer = L.layerGroup().addTo(map);

    function fitPolygons() {
      if (polyLayer.getLayers().length) map.fitBounds(polyLayer.getBounds(), { padding: [30, 30] });
    }

    /* ── Tabs ── */
    function switchTab(t) {
      document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', ['check','history'][i] === t));
      document.querySelectorAll('.tab-pane').forEach((el) => el.classList.remove('active'));
      document.getElementById(`tab-${t}`).classList.add('active');
      if (t === 'history') loadHistory();
    }

    /* ── Helpers ── */
    function esc(v) {
      return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
        .replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }
    function fmt(v) {
      const d = new Date(v); return isNaN(d) ? v : d.toLocaleString();
    }

    /* ── Auth + Project ── */
    async function boot() {
      const r = await fetch('/api/me');
      if (r.status === 401) { location.href = '/login'; return; }
      const u = await r.json();
      document.getElementById('navUser').innerText = u.full_name;

      const pr = await fetch('/api/projects');
      const projects = await pr.json();
      const proj = projects.find(p => String(p.id) === String(projectId));
      if (!proj) { alert('Project not found.'); location.href = '/dashboard'; return; }

      document.title = `${proj.name} — RightG`;
      document.getElementById('navProjectName').innerText = proj.name;

      await loadPolygons();
      await loadHistory();
    }

    async function loadPolygons() {
      const r = await fetch(`/api/projects/${projectId}/polygons`);
      if (!r.ok) return;
      const data = await r.json();
      polyLayer.clearLayers();
      polyLayer.addData(data);
      const n = (data.features || []).length;
      document.getElementById('statPoly').innerText = n;
      document.getElementById('statStatus').innerText = n ? 'Loaded' : 'Empty';
      if (n) { fitPolygons(); document.getElementById('mapHint').innerText = `${n} coverage zone${n>1?'s':''} loaded`; }
      else document.getElementById('mapHint').innerText = 'No polygons yet — add some via Manage Polygons';
    }

    async function loadHistory() {
      const r = await fetch(`/api/projects/${projectId}/my-checks`);
      if (!r.ok) return;
      const rows = await r.json();
      const el = document.getElementById('histList');
      if (!rows.length) { el.innerHTML = '<div class="hist-empty">No checks yet for this project.</div>'; return; }
      el.innerHTML = rows.map(row => `
        <div class="hist-item">
          <div class="hist-row">
            <div class="hist-addr">${esc(row.input_address)}</div>
            <div class="hist-time">${fmt(row.created_at)}</div>
          </div>
          <div class="hist-status ${row.matched ? 'hist-inside' : 'hist-outside'}">
            ${row.matched ? '✓ Inside' : '✗ Outside'}
            ${row.matched_polygon_names.length ? ' · ' + row.matched_polygon_names.map(esc).join(', ') : ''}
          </div>
        </div>`).join('');
    }

    /* ── Check address ── */
    async function checkAddr() {
      const address = document.getElementById('addrInput').value.trim();
      if (!address) { document.getElementById('addrInput').focus(); return; }

      const btn = document.getElementById('checkBtn');
      const rb = document.getElementById('resultBox');
      const rd = document.getElementById('resultDetail');
      btn.disabled = true;
      rb.className = 'result-box loading'; rb.innerText = 'Checking address…';
      rd.style.display = 'none';

      const r = await fetch(`/api/projects/${projectId}/check-address`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ address })
      });
      btn.disabled = false;
      if (r.status === 401) { location.href = '/login'; return; }
      const data = await r.json();

      markerLayer.clearLayers();

      if (!r.ok) {
        rb.className = 'result-box outside'; rb.innerText = data.detail || 'Error checking address.'; return;
      }

      const marker = L.marker([data.geocode.lat, data.geocode.lng]).addTo(markerLayer);
      marker.bindPopup(data.normalized_address || data.address).openPopup();
      map.panTo([data.geocode.lat, data.geocode.lng]);

      if (data.matched) {
        rb.className = 'result-box inside';
        rb.innerHTML = `<svg style="display:inline;vertical-align:-2px;margin-right:5px" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Inside — this address is within your coverage area.`;
      } else {
        rb.className = 'result-box outside';
        rb.innerHTML = `<svg style="display:inline;vertical-align:-2px;margin-right:5px" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>Outside — not inside any saved polygon.`;
      }

      const names = (data.matched_polygon_names || []).map(n => `<span class="pill">${esc(n)}</span>`).join('');
      rd.style.display = 'block';
      rd.innerHTML = `
        <div><strong>Matched:</strong> ${names || 'None'}</div>
        <div><strong>Address:</strong> ${esc(data.normalized_address || data.address)}</div>
        <div><strong>Coords:</strong> ${data.geocode.lat.toFixed(5)}, ${data.geocode.lng.toFixed(5)}</div>
        <div><strong>Polygons checked:</strong> ${data.total_polygons_checked}</div>`;

      loadHistory();
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      location.href = '/';
    }

    boot();
  </script>
</body>
</html>
