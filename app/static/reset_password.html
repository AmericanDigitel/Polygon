<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Address Coverage Checker</title>
  <style>
    :root { --bg:#f4f7fb; --card:#fff; --text:#122033; --muted:#64748b; --line:#dbe3ef; --primary:#1d4ed8; --primary2:#2563eb; --error:#991b1b; --errorbg:#fee2e2; --ok:#166534; --okbg:#dcfce7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter, Arial, sans-serif; color:var(--text); background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%); min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card { width:min(100%,540px); background:#fff; border:1px solid var(--line); border-radius:28px; box-shadow:0 24px 60px rgba(15,23,42,.08); padding:32px; }
    .eyebrow { display:inline-block; padding:8px 12px; border-radius:999px; background:#eff6ff; color:var(--primary); font-weight:800; font-size:12px; letter-spacing:.05em; text-transform:uppercase; }
    h1 { margin:16px 0 10px; font-size:34px; }
    p { color:var(--muted); line-height:1.6; }
    label { display:block; margin:18px 0 8px; font-weight:800; }
    input { width:100%; padding:16px 18px; border:1px solid var(--line); border-radius:16px; font-size:17px; }
    button { width:100%; margin-top:18px; border:none; border-radius:16px; padding:15px 18px; font-size:17px; font-weight:800; color:#fff; background:linear-gradient(135deg,var(--primary),var(--primary2)); cursor:pointer; }
    .status { display:none; margin-top:16px; padding:14px 16px; border-radius:16px; font-weight:700; white-space:pre-wrap; }
    .status.error { display:block; background:var(--errorbg); color:var(--error); }
    .status.success { display:block; background:var(--okbg); color:var(--ok); }
    a { color:var(--primary); text-decoration:none; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Security</span>
    <h1>Choose a new password</h1>
    <p>Enter your new password below. This page expects a valid reset link with a token.</p>
    <label for="password">New password</label>
    <input id="password" type="password" placeholder="At least 8 characters" />
    <button onclick="resetPassword()">Reset password</button>
    <div id="status" class="status"></div>
    <p><a href="/login">Back to login</a></p>
  </div>
  <script>
    const token = new URLSearchParams(window.location.search).get('token') || '';
    async function resetPassword() {
      const password = document.getElementById('password').value;
      const status = document.getElementById('status');
      if (!token) {
        status.className = 'status error';
        status.innerText = 'Missing reset token.';
        return;
      }
      const res = await fetch('/api/reset-password', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();
      if (!res.ok) {
        status.className = 'status error';
        status.innerText = data.detail || 'Reset failed.';
        return;
      }
      status.className = 'status success';
      status.innerText = (data.message || 'Password reset successfully.') + '\n\nYou can now go to the login page.';
    }
  </script>
</body>
</html>
